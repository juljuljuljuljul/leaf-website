<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Forest</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: auto;
    }

    body {
      background: #fff;
      height: 1600vh;
    }

    .viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .branch {
      position: absolute;
      opacity: 0;
      will-change: transform, filter, opacity;
    }

    .branch img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* flip just the image so positioning transforms are unaffected */
    .branch.flipped img {
      transform: scaleX(-1);
    }

    /* horizontal position set per-element in JS (centered by default) */
    .branch {
      transform-origin: bottom center;
    }

    .scroll-hint {
      position: fixed;
      bottom: 2.4rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #aaa;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .scroll-hint::after {
      content: '';
      display: block;
      margin: 0.5rem auto 0;
      width: 1px;
      height: 28px;
      background: #ccc;
      animation: tickle 1.8s ease-in-out infinite;
    }

    @keyframes tickle {
      0%, 100% { transform: scaleY(1); opacity: 0.5; }
      50% { transform: scaleY(0.4); opacity: 1; }
    }

    .text-card {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center center;
      white-space: nowrap;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(0.75rem, 1.5vw, 1.7rem);
      color: #111;
      letter-spacing: 0.04em;
      opacity: 0;
      pointer-events: none;
      will-change: transform, filter, opacity;
      z-index: 32;
    }

    #pollen {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* ── Bottle scene ──────────────────────────────────────────────────── */
    #bottleScene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 35;
    }

    #bottleCompose {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #bottleImg {
      height: 56vh;
      width: auto;
      display: block;
      position: relative;
      z-index: 1;
    }

    #logoSvg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 74vw;
      max-width: 920px;
      min-width: 300px;
      display: block;
      z-index: 2;
      overflow: visible;
    }
  </style>
</head>
<body>

  <canvas id="pollen"></canvas>
  <div class="scroll-hint" id="scrollHint">scroll</div>

  <script>
    /* ─── Branch definitions ───────────────────────────────────────────────
       Trajectory: each branch emerges centered-ish (far/small), sharpens at
       its focus point, then sweeps out to the side as it "passes" the viewer.
       widthVw  — base width; bottom — vertical anchor offset from floor.
       flip     — mirrors the image horizontally for variety.
    ────────────────────────────────────────────────────────────────────── */
    /* Sequence uses a 7-image cycle (2,5,3,1,4,6,9 / 2,5,3,1,4,6,10 / 2,5,3,1,4,6)
       so any given image number is always ≥ 0.315 scroll-units apart — wider than
       the 0.26 visibility window — meaning no two plants of the same species are
       ever on screen simultaneously. Branch 9 & 10 appear once each. */
    const CONFIGS = [
      { img: 'branch 2.png', side: 'left',  focusAt: 0.040, rot:  5, widthVw: 26, bottom: '-3%' },
      { img: 'branch 8.png', side: 'right', focusAt: 0.065, rot: -4, widthVw: 21, bottom: '-2%' },
      { img: 'branch 5.png', side: 'right', focusAt: 0.085, rot: -4, widthVw: 18, bottom: '-2%', flip: true },
      { img: 'branch 3.png', side: 'left',  focusAt: 0.130, rot:  6, widthVw: 31, bottom: '-5%' },
      { img: 'branch 1.png', side: 'right', focusAt: 0.175, rot: -5, widthVw: 17, bottom: '-1%' },
      { img: 'branch 4.png', side: 'left',  focusAt: 0.220, rot:  4, widthVw: 28, bottom: '-4%', flip: true },
      { img: 'branch 6.png', side: 'right', focusAt: 0.265, rot: -6, widthVw: 19, bottom: '-2%' },
      { img: 'branch 9.png', side: 'left',  focusAt: 0.310, rot:  3, widthVw: 22, bottom: '-3%' },
      { img: 'branch 2.png', side: 'right', focusAt: 0.355, rot: -5, widthVw: 33, bottom: '-6%', flip: true },
      { img: 'branch 5.png', side: 'left',  focusAt: 0.400, rot:  5, widthVw: 16, bottom: '-1%' },
      { img: 'branch 8.png', side: 'left',  focusAt: 0.390, rot:  5, widthVw: 19, bottom: '-2%' },
      { img: 'branch 7.png', side: 'right', focusAt: 0.430, rot: -5, widthVw: 20, bottom: '-3%', flip: true },
      { img: 'branch 3.png', side: 'right', focusAt: 0.445, rot: -4, widthVw: 29, bottom: '-4%', flip: true },
      { img: 'branch 1.png', side: 'left',  focusAt: 0.490, rot:  7, widthVw: 25, bottom: '-3%', flip: true },
      { img: 'branch 4.png', side: 'right', focusAt: 0.535, rot: -7, widthVw: 18, bottom: '-2%' },
      { img: 'branch 6.png', side: 'left',  focusAt: 0.580, rot:  5, widthVw: 32, bottom: '-5%', flip: true },
      { img: 'branch 10.png', side: 'right', focusAt: 0.625, rot: -4, widthVw: 20, bottom: '-2%' },
      { img: 'branch 2.png', side: 'left',  focusAt: 0.670, rot:  6, widthVw: 27, bottom: '-4%', flip: true },
      { img: 'branch 5.png', side: 'right', focusAt: 0.715, rot: -5, widthVw: 17, bottom: '-1%', flip: true },
      { img: 'branch 8.png', side: 'right', focusAt: 0.720, rot: -6, widthVw: 23, bottom: '-3%', flip: true },
      { img: 'branch 7.png', side: 'left',  focusAt: 0.742, rot:  6, widthVw: 24, bottom: '-4%', flip: true },
      { img: 'branch 3.png', side: 'left',  focusAt: 0.760, rot:  4, widthVw: 34, bottom: '-6%' },
      { img: 'branch 1.png', side: 'right', focusAt: 0.805, rot: -6, widthVw: 19, bottom: '-3%', flip: true },
      { img: 'branch 4.png', side: 'left',  focusAt: 0.850, rot:  5, widthVw: 30, bottom: '-5%' },
      { img: 'branch 6.png', side: 'right', focusAt: 0.895, rot: -5, widthVw: 16, bottom: '-2%', flip: true },
    ];

    /* ─── Tunable constants ────────────────────────────────────────────── */
    const WINDOW_HALF = 0.13;  // scroll-progress radius of visibility per branch
    const MIN_SCALE   = 0.28;  // scale when far (appearing ahead, centered)
    const MAX_SCALE   = 3.0;   // scale when passing very close
    const BLUR_FAR    = 16;    // px blur when distant and ahead
    const BLUR_CLOSE  = 22;    // px blur when huge and passing
    // All TX values in vw, measuring how far the branch centre is from screen centre.
    // Trajectory: small offset (nearly centred, far) → medium (focus, peeking to side) → large (swept off-screen)
    const TX_FAR   =  4;   // vw — nearly centred when tiny and distant
    const TX_FOCUS = 24;   // vw — peeking to the side at sharpest point
    const TX_CLOSE = 62;   // vw — swept mostly off-screen when passing close

    /* ─── Build DOM ────────────────────────────────────────────────────── */
    const viewport = document.getElementById('viewport');
    const scrollHint = document.getElementById('scrollHint');

    const branches = CONFIGS.map(cfg => {
      const el = document.createElement('div');
      el.className = `branch${cfg.flip ? ' flipped' : ''}`;
      el.style.width  = `${cfg.widthVw}vw`;
      el.style.bottom = cfg.bottom;
      // Centre the element horizontally so transform-origin:bottom-center
      // sits exactly at the viewport's horizontal midpoint.
      el.style.left = `calc(50% - ${cfg.widthVw / 2}vw)`;

      const img = document.createElement('img');
      img.src = cfg.img;
      img.alt = '';
      el.appendChild(img);
      viewport.appendChild(el);

      return { ...cfg, el };
    });

    /* ─── Text sentences ───────────────────────────────────────────────── */
    // focusStart = the moment the sentence snaps sharp and holds.
    const TEXT_CONFIGS = [
      { text: 'Born at the living edge', focusStart: 0.07 },
      { text: 'of the natural world',    focusStart: 0.21 },
      { text: 'where the raw',           focusStart: 0.35 },
      { text: 'meets the rich',          focusStart: 0.49 },
      { text: 'and the wild',            focusStart: 0.63 },
      { text: 'comes home.',             focusStart: 0.76 },
    ];

    const TEXT_APPROACH   = 0.04;  // scroll to blur-in from small
    const TEXT_DWELL      = 0.07;  // scroll held perfectly sharp (reading window)
    const TEXT_RECEDE     = 0.05;  // scroll to grow-out blurry
    const TEXT_MIN_SCALE  = 0.40;
    const TEXT_MAX_SCALE  = 2.0;
    const TEXT_BLUR_FAR   = 14;
    const TEXT_BLUR_CLOSE = 18;
    const TY_FAR          = 16;   // vh below centre when first appearing
    const TY_CLOSE        = -18;  // vh above centre when passing overhead

    const textCards = TEXT_CONFIGS.map(cfg => {
      const el = document.createElement('div');
      el.className = 'text-card';
      el.textContent = cfg.text;
      viewport.appendChild(el);
      return { ...cfg, el };
    });

    /* ─── Math helpers ─────────────────────────────────────────────────── */
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function lerp(a, b, t)     { return a + (b - a) * clamp(t, 0, 1); }
    function easeIn(t)         { return t * t; }
    function easeOut(t)        { return 1 - (1 - t) * (1 - t); }
    function fade(t)           { return clamp(1 - t * t, 0, 1); }

    /* ─── Bottle / logo element refs ───────────────────────────────────── */
    const bottleScene = document.getElementById('bottleScene');
    const logoGhost   = document.getElementById('logoGhost');
    const waveShape   = document.getElementById('waveShape');

    /* ─── Smooth scroll state ──────────────────────────────────────────── */
    let smoothProgress = 0;
    const EASE = 0.04;

    /* ─── Scroll-stop detection for logo trigger ────────────────────────── */
    let prevRaw       = 0;
    let stillFrames   = 0;
    let logoTriggered = false;

    /* ─── Continuous animation loop ────────────────────────────────────── */
    function tick() {
      const maxScroll   = document.body.scrollHeight - window.innerHeight;
      const rawProgress = maxScroll > 0 ? window.scrollY / maxScroll : 0;

      smoothProgress += (rawProgress - smoothProgress) * EASE;

      scrollHint.style.opacity = window.scrollY > 10 ? '0' : '1';

      /* ── scroll-stop detection ─────────────────────────────────────── */
      if (Math.abs(rawProgress - prevRaw) < 0.00008) {
        stillFrames++;
      } else {
        stillFrames = 0;
        prevRaw = rawProgress;
      }

      /* ── branches: fade out as home scene approaches ───────────────── */
      const endFade = clamp(1 - (smoothProgress - 0.84) / 0.10, 0, 1);

      branches.forEach(({ el, focusAt, side, rot }) => {
        const d    = smoothProgress - focusAt;
        const absD = Math.abs(d);

        if (absD > WINDOW_HALF) {
          el.style.opacity = '0';
          el.style.zIndex  = '0';
          return;
        }

        const t           = absD / WINDOW_HALF;
        const approaching = d < 0;
        let scale, blur, tx;

        if (approaching) {
          scale = lerp(MIN_SCALE, 1.0, easeOut(1 - t));
          blur  = lerp(0, BLUR_FAR,   easeIn(t));
          tx    = lerp(TX_FOCUS, TX_FAR, easeIn(t));
        } else {
          scale = lerp(1.0, MAX_SCALE, easeIn(t));
          blur  = lerp(0, BLUR_CLOSE, easeIn(t));
          tx    = lerp(TX_FOCUS, TX_CLOSE, easeIn(t));
        }

        const txVw = side === 'left' ? -tx : tx;
        el.style.zIndex    = Math.round(scale * 10);
        el.style.opacity   = (fade(t) * endFade).toFixed(4);
        el.style.filter    = `blur(${blur.toFixed(2)}px)`;
        el.style.transform = `translateX(${txVw.toFixed(2)}vw) scale(${scale.toFixed(4)}) rotate(${rot}deg)`;
      });

      /* ── text sentences: approach → dwell → recede ─────────────────── */
      textCards.forEach(({ el, focusStart }) => {
        const span = TEXT_APPROACH + TEXT_DWELL + TEXT_RECEDE;
        const d    = smoothProgress - (focusStart - TEXT_APPROACH);

        if (d < 0 || d > span) { el.style.opacity = '0'; return; }

        let scale, blur, opacity;

        let ty;
        if (d < TEXT_APPROACH) {
          const t = d / TEXT_APPROACH;
          scale   = lerp(TEXT_MIN_SCALE, 1.0, easeOut(t));
          blur    = lerp(TEXT_BLUR_FAR, 0,    easeOut(t));
          opacity = easeOut(t);
          ty      = lerp(TY_FAR, 0,        easeOut(t));
        } else if (d < TEXT_APPROACH + TEXT_DWELL) {
          scale = 1; blur = 0; opacity = 1; ty = 0;  // held sharp at centre
        } else {
          const t = (d - TEXT_APPROACH - TEXT_DWELL) / TEXT_RECEDE;
          scale   = lerp(1.0, TEXT_MAX_SCALE,  easeIn(t));
          blur    = lerp(0,   TEXT_BLUR_CLOSE, easeIn(t));
          opacity = 1 - easeIn(t);
          ty      = lerp(0, TY_CLOSE,          easeIn(t));
        }

        el.style.opacity   = (opacity * endFade).toFixed(4);
        el.style.filter    = `blur(${blur.toFixed(2)}px)`;
        // translate(-50%, calc(-50% + tyVh)) centres the element then offsets it vertically
        el.style.transform = `translate(-50%, calc(-50% + ${ty.toFixed(1)}vh)) scale(${scale.toFixed(4)})`;
      });

      /* ── bottle scene reveal ───────────────────────────────────────── */
      const bottleT     = clamp((smoothProgress - 0.86) / 0.10, 0, 1);
      const bottleEased = easeOut(bottleT);
      bottleScene.style.opacity   = bottleEased.toFixed(3);
      bottleScene.style.transform = `scale(${lerp(0.88, 1, bottleEased).toFixed(3)})`;

      logoGhost.style.opacity = clamp((bottleEased - 0.5) / 0.5, 0, 0.07).toFixed(3);

      /* ── trigger logo wave once scroll settles at the end ──────────── */
      if (rawProgress < 0.82) {
        if (logoTriggered) {
          logoTriggered = false;
          waveShape.setAttribute('d', '');
        }
      }

      if (!logoTriggered && stillFrames > 30 && smoothProgress > 0.90) {
        logoTriggered = true;
        setTimeout(animateLogoWave, 420);
      }

      requestAnimationFrame(tick);
    }

    tick();

    /* ─── Logo wave fill animation ──────────────────────────────────────── */
    function animateLogoWave() {
      const W = 497.13, H = 191.94;
      const duration = 2600;
      let startTs = null;

      function frame(ts) {
        if (!startTs) startTs = ts;
        const elapsed = ts - startTs;
        const t       = Math.min(elapsed / duration, 1);

        // ease-out cubic: slow down as it finishes filling
        const filled  = 1 - Math.pow(1 - t, 3);
        const fillTop = H * (1 - filled);

        // wave amplitude peaks mid-animation then settles to zero
        const amp   = 13 * Math.sin(t * Math.PI);
        const speed = elapsed * 0.0032;

        // build wavy fill path from bottom up
        const steps = 60;
        let d = `M -2 ${H}`;
        for (let i = 0; i <= steps; i++) {
          const x = (i / steps) * (W + 4) - 2;
          const y = fillTop + Math.sin((i / steps) * Math.PI * 3.5 + speed) * amp;
          d += ` L ${x.toFixed(1)} ${y.toFixed(2)}`;
        }
        d += ` L ${W + 2} ${H} Z`;
        waveShape.setAttribute('d', d);

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          // snap to solid fill once animation completes
          waveShape.setAttribute('d', `M 0 0 L ${W} 0 L ${W} ${H} L 0 ${H} Z`);
        }
      }

      requestAnimationFrame(frame);
    }
  </script>

  <script>
    /* ─── Pollen particles ─────────────────────────────────────────────── */
    const pollenCanvas = document.getElementById('pollen');
    const ctx = pollenCanvas.getContext('2d');

    function resizePollen() {
      pollenCanvas.width  = window.innerWidth;
      pollenCanvas.height = window.innerHeight;
    }
    resizePollen();
    window.addEventListener('resize', resizePollen);

    const PARTICLE_COUNT = 80;

    function makeParticle(randomY = false) {
      return {
        x:          Math.random() * pollenCanvas.width,
        y:          randomY ? Math.random() * pollenCanvas.height : pollenCanvas.height + 8,
        r:          0.5 + Math.random() * 2.0,
        vy:         -(0.08 + Math.random() * 0.28),   // slow upward drift
        vx:         (Math.random() - 0.5) * 0.15,
        phase:      Math.random() * Math.PI * 2,
        phaseSpeed: 0.006 + Math.random() * 0.012,
        wobbleAmp:  0.25 + Math.random() * 0.55,
        opacity:    0.12 + Math.random() * 0.42,
      };
    }

    const particles = Array.from({ length: PARTICLE_COUNT }, () => makeParticle(true));

    function tickPollen() {
      ctx.clearRect(0, 0, pollenCanvas.width, pollenCanvas.height);

      for (const p of particles) {
        p.phase += p.phaseSpeed;
        p.x += p.vx + Math.sin(p.phase) * p.wobbleAmp;
        p.y += p.vy;

        // wrap horizontally
        if (p.x < -4) p.x = pollenCanvas.width + 4;
        if (p.x > pollenCanvas.width + 4) p.x = -4;

        // respawn at bottom when leaving top
        if (p.y < -4) {
          Object.assign(p, makeParticle(false));
        }

        // soft fade near top and bottom edges
        const edgeFade = Math.min(1, p.y / 60, (pollenCanvas.height - p.y) / 60);
        const alpha = p.opacity * Math.max(0, edgeFade);

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(218, 205, 158, ${alpha.toFixed(3)})`;
        ctx.fill();
      }

      requestAnimationFrame(tickPollen);
    }

    tickPollen();
  </script>
</body>
